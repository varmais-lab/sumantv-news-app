<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SumanTV News</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;500;600;700;800&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #E8001D; --blue: #0066CC;
    --text: #1a1a1a; --muted: #999;
    --border: #e8e8e8; --bg: #f0f0f0;
    --white: #fff; --dark: #1a1a2e;
  }
  html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); font-family: 'Barlow', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }

  /* ── Top Nav (fixed) ── */
  #top-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 10px 16px 0;
  }
  .nav-logo-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .nav-logo-img { height: 24px; width: auto; }
  .nav-logo-text { font-size: 17px; font-weight: 800; color: var(--red); letter-spacing: 0.5px; }
  .nav-tabs { display: flex; }
  .nav-tab { font-family: 'Noto Sans Telugu', sans-serif; font-size: 13px; font-weight: 600; color: var(--muted); padding: 6px 12px 9px; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; }
  .nav-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* ── Bottom Nav (fixed) ── */
  #bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--white); border-top: 1px solid var(--border);
    display: flex; padding: 8px 0 12px;
  }
  .bnav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; border: none; background: none; cursor: pointer; padding: 4px; }
  .bnav-icon { font-size: 19px; line-height: 1; }
  .bnav-label { font-family: 'Noto Sans Telugu', sans-serif; font-size: 9px; color: var(--muted); }
  .bnav-btn.active .bnav-label { color: var(--blue); }

  /* ── Feed ── */
  #feed { position: fixed; left: 0; right: 0; overflow: hidden; touch-action: none; }

  /* ── Article ── */
  .article {
    position: absolute; left: 0; right: 0; height: 100%;
    background: var(--white);
    display: flex; flex-direction: column;
    transition: transform 0.42s cubic-bezier(0.25,0.46,0.45,0.94);
    will-change: transform;
  }

  /* Images */
  .art-images {
    flex-shrink: 0; height: 38%;
    display: grid; position: relative; overflow: hidden; background: #ccc;
  }
  .art-images.two { grid-template-columns: 1fr 1fr; gap: 2px; }
  .art-images img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* Source badge */
  .src-badge {
    position: absolute; bottom: 8px; left: 10px;
    background: rgba(255,255,255,0.93); border-radius: 6px;
    padding: 4px 8px; display: flex; align-items: center; gap: 5px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.18);
  }
  .src-icon { width: 15px; height: 15px; background: var(--red); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #fff; font-weight: 900; flex-shrink: 0; }
  .src-name { font-size: 10px; font-weight: 700; color: var(--text); }

  /* Image right actions */
  .img-btns { position: absolute; bottom: 8px; right: 10px; display: flex; gap: 7px; }
  .img-btn { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.93); border: none; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.18); transition: all 0.15s; }
  .img-btn:active { transform: scale(0.88); }
  .img-btn.bm-active { background: var(--blue); }

  /* More btn */
  .more-btn { position: absolute; top: 8px; right: 10px; width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.88); border: none; font-size: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; letter-spacing: -1px; }

  /* Content */
  .art-content { flex: 1; overflow-y: auto; padding: 14px 16px 8px; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }

  .art-title { font-family: 'Noto Sans Telugu', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); line-height: 1.45; margin-bottom: 11px; }
  .art-body { font-family: 'Noto Sans Telugu', sans-serif; font-size: 14.5px; color: #333; line-height: 1.75; margin-bottom: 8px; }
  .art-time { font-size: 11px; color: var(--muted); margin-bottom: 12px; font-family: 'Barlow', sans-serif; }

  /* Reactions */
  .react-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
  .react-pill { display: flex; align-items: center; gap: 3px; background: #f3f3f3; border: 1px solid #e0e0e0; border-radius: 20px; padding: 5px 9px; font-size: 14px; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
  .react-pill.sel { background: #fff0f0; border-color: var(--red); }
  .react-pill .rc { font-size: 10px; font-weight: 700; color: var(--muted); }
  .react-pill.sel .rc { color: var(--red); }

  .expr-wrap { position: relative; }
  .expr-toggle { display: flex; align-items: center; gap: 3px; background: #f3f3f3; border: 1px solid #e0e0e0; border-radius: 20px; padding: 5px 10px; font-family: 'Noto Sans Telugu', sans-serif; font-size: 11px; font-weight: 600; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .expr-toggle.open { border-color: #e8a000; color: #e8a000; background: #fffbf0; }

  .expr-picker { position: absolute; bottom: 38px; left: 0; background: var(--white); border: 1px solid #e0e0e0; border-radius: 14px; padding: 8px 10px; display: none; gap: 6px; z-index: 80; box-shadow: 0 4px 20px rgba(0,0,0,0.13); white-space: nowrap; }
  .expr-picker.show { display: flex; }
  .expr-emoji { font-size: 22px; cursor: pointer; transition: transform 0.15s; padding: 2px; border-radius: 50%; }
  .expr-emoji:active { transform: scale(1.3); }
  .expr-emoji.chosen { background: #fff3c0; }

  /* Tap more strip */
  .tap-strip { flex-shrink: 0; background: var(--dark); padding: 11px 16px; cursor: pointer; }
  .tap-strip:active { background: #222244; }
  .tap-text { font-family: 'Barlow', sans-serif; font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.4; }
  .tap-text strong { color: #fff; font-weight: 700; }

  /* Side dots */
  #sw-dots { position: fixed; right: 5px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 5px; z-index: 60; pointer-events: none; }
  .sw-dot { width: 3px; height: 3px; background: rgba(0,0,0,0.15); border-radius: 3px; transition: all 0.3s; }
  .sw-dot.active { background: var(--blue); height: 14px; }
  .sw-dot.seen { background: rgba(0,0,0,0.3); }

  /* Swipe hint */
  #sw-hint { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #fff; border-radius: 20px; padding: 6px 16px; font-family: 'Noto Sans Telugu', sans-serif; font-size: 12px; z-index: 60; pointer-events: none; white-space: nowrap; transition: opacity 0.4s; animation: pulse 2.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:0.9} 50%{opacity:0.4} }

  /* Toast */
  #toast { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%) translateY(16px); background: rgba(0,80,180,0.9); color: #fff; border-radius: 20px; padding: 7px 16px; font-size: 12px; font-weight: 600; font-family: 'Noto Sans Telugu', sans-serif; opacity: 0; transition: all 0.3s; z-index: 100; white-space: nowrap; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Float emoji */
  .fl-emoji { position: fixed; pointer-events: none; z-index: 200; font-size: 26px; animation: flup 1s ease-out forwards; }
  @keyframes flup { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-90px) scale(1.5)} }

  /* More menu */
  #more-menu { position: fixed; inset: 0; z-index: 150; display: none; }
  #more-menu.show { display: block; }
  .mm-bg { position: absolute; inset: 0; }
  .mm-box { position: absolute; top: 48px; right: 14px; background: var(--white); border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.14); overflow: hidden; min-width: 170px; }
  .mm-item { display: flex; align-items: center; gap: 8px; padding: 13px 15px; font-size: 13px; color: var(--text); cursor: pointer; font-family: 'Noto Sans Telugu', sans-serif; border-bottom: 1px solid #f0f0f0; }
  .mm-item:last-child { border: none; }
  .mm-item:active { background: #f5f5f5; }
</style>
</head>

<div id="top-nav">

    <span class="nav-logo-text">SumanTV</span>

  <div class="nav-tabs">

<!-- Feed -->

<script>
const articles = [
  { id:1, source:'SumanTV News', images:['https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=700&q=80','https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=700&q=80'], title:'తెలంగాణలో కొత్త విద్యుత్ విధానం: ప్రభుత్వం కీలక నిర్ణయం', body:'తెలంగాణ ప్రభుత్వం కొత్త విద్యుత్ విధానాన్ని ప్రకటించింది. ఈ విధానం ప్రకారం రైతులకు 24 గంటలు నిరంతర విద్యుత్ సరఫరా చేయనున్నారు. ముఖ్యమంత్రి రేవంత్ రెడ్డి ఈ విధానాన్ని వచ్చే ఆర్థిక సంవత్సరం నుండి అమలు చేస్తామని ప్రకటించారు. రాష్ట్రంలో విద్యుత్ సంక్షోభాన్ని అధిగమించడానికి ఈ కొత్త విధానం తోడ్పడుతుందని అధికారులు తెలిపారు.', time:'కొన్ని గంటల క్రితం', tapMore:'మరిన్ని వివరాలు', tapAt:'SumanTV News' },
  { id:2, source:'SumanTV Entertainment', images:['https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=700&q=80'], title:'మెగాస్టార్ చిరంజీవి నూతన చిత్రం షూటింగ్ ముంబైలో ప్రారంభం', body:'మెగాస్టార్ చిరంజీవి నూతన చిత్రం షూటింగ్ ముంబైలో ప్రారంభమైంది. కొరటాల శివ దర్శకత్వంలో రూపొందే ఈ చిత్రంలో పూజా హెగ్డే హీరోయిన్‌గా నటిస్తోంది. భారీ బడ్జెట్‌తో రూపొందే ఈ చిత్రం 2026 దీపావళికి విడుదల కానుందని నిర్మాతలు తెలిపారు.', time:'2 గంటల క్రితం', tapMore:'ట్రైలర్ చూడండి', tapAt:'SumanTV News' },
  { id:3, source:'SumanTV Sports', images:['https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=700&q=80','https://images.unsplash.com/photo-1531415074968-036ba1b575da?w=700&q=80'], title:'IPL 2026: సన్‌రైజర్స్ హైదరాబాద్ ముంబై ఇండియన్స్‌పై అద్భుత విజయం', body:'ఇండియన్ ప్రీమియర్ లీగ్‌లో సన్‌రైజర్స్ హైదరాబాద్ ముంబై ఇండియన్స్‌పై అద్భుత విజయం సాధించింది. హైదరాబాద్ జట్టు 180 పరుగులు చేసి ముంబైని 24 పరుగులతో ఓడించింది. పాట్ కమిన్స్ అద్భుత బౌలింగ్ హైదరాబాద్ విజయంలో కీలక పాత్ర పోషించింది.', time:'3 గంటల క్రితం', tapMore:'స్కోర్‌కార్డ్ చూడండి', tapAt:'SumanTV News' },
  { id:4, source:'SumanTV Business', images:['https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=700&q=80'], title:'హైదరాబాద్ స్టార్టప్‌కు రూ.500 కోట్ల అంతర్జాతీయ పెట్టుబడి', body:'హైదరాబాద్‌కు చెందిన టెక్ స్టార్టప్ ఇన్నోవేట్ ఏఐకు అంతర్జాతీయ పెట్టుబడిదారులు రూ.500 కోట్ల పెట్టుబడి పెట్టారు. ఈ స్టార్టప్ కృత్రిమ మేధస్సు ఆధారంగా వ్యవసాయ రంగంలో విప్లవం తేనుంది. 200 మంది యువతకు ఉద్యోగావకాశాలు కలిగించనుందని సంస్థ ప్రకటించింది.', time:'5 గంటల క్రితం', tapMore:'పూర్తి కథనం', tapAt:'SumanTV News' },

const EXPR = [
  {e:'😮',l:'షాక్'},{e:'😡',l:'కోపం'},{e:'😢',l:'దుఃఖం'},
  {e:'🤔',l:'ఆలోచన'},{e:'👏',l:'క్లాప్'},{e:'❤️',l:'ప్రేమ'},{e:'😂',l:'నవ్వు'}
];

let cur = 0;
const SNAP = 50;

const st = articles.map(() => ({
  bm: false, myE: null, eo: false,
  rc: Object.fromEntries(EXPR.map(e=>[e.e, Math.floor(Math.random()*60+5)]))
}));

/* ── Layout ── */
function getNavH() { return document.getElementById('top-nav').offsetHeight; }
function getBnH()  { return document.getElementById('bottom-nav').offsetHeight; }

function buildCards() {
  const feed = document.getElementById('feed');
  // Force reflow to get accurate heights
  const nh = document.getElementById('top-nav').getBoundingClientRect().height;
  const bh = document.getElementById('bottom-nav').getBoundingClientRect().height;
  const totalH = window.innerHeight;
  feed.style.top = Math.ceil(nh) + 'px';
  feed.style.bottom = Math.ceil(bh) + 'px';
  feed.style.left = '0';
  feed.style.right = '0';
  feed.style.position = 'fixed';
  feed.innerHTML = '';

  articles.forEach((a, i) => {
    const s = st[i];
    const card = document.createElement('div');
    card.className = 'article';
    card.id = 'c' + i;
    card.style.transform = `translateY(${i * 100}%)`;

    const two = a.images.length > 1;
    const imgs = a.images.map(src =>
      `<img src="${src}" alt="" onerror="this.src='https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=700&q=80'">`
    ).join('');

    const top3 = EXPR.filter(e => s.rc[e.e] > 0)
      .sort((a,b) => s.rc[b.e] - s.rc[a.e]).slice(0, 3);
    const pills = top3.map(e =>
      `<div class="react-pill ${s.myE===e.e?'sel':''}" onclick="pickE(${i},'${e.e}',event)">${e.e}<span class="rc">${s.rc[e.e]}</span></div>`
    ).join('');

    card.innerHTML = `
      <div class="art-images${two?' two':''}">
        ${imgs}
        <div class="src-badge"><div class="src-icon">S</div><span class="src-name">${a.source}</span></div>
        <div class="img-btns">
          <button class="img-btn${s.bm?' bm-active':''}" id="bm${i}" onclick="toggleBM(${i},event)">${s.bm?'🔖':'🏷️'}</button>
          <button class="img-btn" onclick="share(${i},event)">🔗</button>
        </div>
        <button class="more-btn" onclick="openMM(event)">•••</button>
      </div>
      <div class="art-content" id="ac${i}">
        <div class="art-title">${a.title}</div>
        <div class="art-body">${a.body}</div>
        <div class="art-time">${a.time}</div>
        <div class="react-row" id="rr${i}">
          ${pills}
          <div class="expr-wrap">
            <button class="expr-toggle" id="et${i}" onclick="togE(${i},event)">😊 స్పందన ▾</button>
            <div class="expr-picker" id="ep${i}">
              ${EXPR.map(e=>`<div class="expr-emoji${s.myE===e.e?' chosen':''}" onclick="pickE(${i},'${e.e}',event)">${e.e}</div>`).join('')}
            </div>
          </div>
        </div>
      </div>
      <div class="tap-strip" onclick="tapMore(${i})">
        <div class="tap-text">${a.tapMore} <strong>${a.tapAt}</strong> లో చదవండి</div>
      </div>`;

    feed.appendChild(card);
  });

  buildDots();
  updateDots();
}

function buildDots() {
  document.getElementById('sw-dots').innerHTML =
    articles.map((_,i) => `<div class="sw-dot" id="d${i}"></div>`).join('');
}

function updateDots() {
  articles.forEach((_,i) => {
    const d = document.getElementById('d'+i);
    if (d) d.className = 'sw-dot' + (i===cur?' active' : i<cur?' seen' : '');
  });
}

function goTo(idx, anim=true) {
  if (idx < 0 || idx >= articles.length) return;
  cur = idx;
  const fh = document.getElementById('feed').offsetHeight || window.innerHeight;
  articles.forEach((_,i) => {
    const c = document.getElementById('c'+i);
    if (!c) return;
    c.style.transition = anim ? 'transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94)' : 'none';
    c.style.transform = `translateY(${(i - cur) * fh}px)`;
    if (i !== cur) { const ac = document.getElementById('ac'+i); if (ac) ac.scrollTop = 0; }
  });
  updateDots();
  closeAllE();
  if (cur > 0) {
    const h = document.getElementById('sw-hint');
    if (h) { h.style.opacity = '0'; setTimeout(() => h.style.display='none', 400); }
  }
}

/* ── Unified touch handler ── */
let tSY = 0, tDY = 0, tActive = false, tFromImage = false;

document.getElementById('feed').addEventListener('touchstart', function(e) {
  tSY = e.touches[0].clientY;
  tDY = 0;
  tFromImage = !!e.target.closest('.art-images') || !!e.target.closest('.tap-strip');
  tActive = true;
}, { passive: true });

document.getElementById('feed').addEventListener('touchmove', function(e) {
  if (!tActive) return;
  tDY = e.touches[0].clientY - tSY;

  // If touch started on content area — only swipe when content is at boundary
  if (!tFromImage) {
    const ac = document.getElementById('ac' + cur);
    if (!ac) return;
    // Scrolling down (content has more below)
    if (tDY < 0 && ac.scrollTop + ac.clientHeight < ac.scrollHeight - 2) return;
    // Scrolling up (content not at top)
    if (tDY > 0 && ac.scrollTop > 0) return;
  }

  // Drag all cards
  const fh = document.getElementById('feed').offsetHeight || window.innerHeight;
  articles.forEach((_,i) => {
    const c = document.getElementById('c'+i);
    if (!c) return;
    c.style.transition = 'none';
    c.style.transform = `translateY(${(i - cur) * fh + tDY}px)`;
  });
}, { passive: true });

document.getElementById('feed').addEventListener('touchend', function() {
  if (!tActive) return;
  tActive = false;
  if (tDY < -SNAP && cur < articles.length - 1) goTo(cur + 1);
  else if (tDY > SNAP && cur > 0) goTo(cur - 1);
  else goTo(cur);
  tDY = 0;
}, { passive: true });

/* Desktop scroll + keyboard */
let wl = false;
document.addEventListener('wheel', e => {
  if (wl) return; wl = true; setTimeout(() => wl = false, 600);
  if (e.deltaY > 20) goTo(cur + 1);
  if (e.deltaY < -20) goTo(cur - 1);
}, { passive: true });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') goTo(cur + 1);
  if (e.key === 'ArrowUp')   goTo(cur - 1);
});

/* ── Actions ── */
function toggleBM(i, e) {
  e.stopPropagation();
  const s = st[i]; s.bm = !s.bm;
  const b = document.getElementById('bm'+i);
  b.classList.toggle('bm-active', s.bm);
  b.textContent = s.bm ? '🔖' : '🏷️';
  if (s.bm) fl('🔖', e);
  toast(s.bm ? '✅ సేవ్ చేయబడింది' : '❌ తీసివేయబడింది');
}

function share(i, e) {
  e.stopPropagation();
  const a = articles[i];
  if (navigator.share) navigator.share({ title: a.title, url: location.href }).catch(()=>{});
  else navigator.clipboard.writeText(a.title + '
' + location.href).catch(()=>{});
  toast('🔗 లింక్ కాపీ అయింది');
}

function tapMore(i) { toast('🌐 ' + articles[i].tapAt + ' తెరవబడుతోంది...'); }

function openMM(e) { e.stopPropagation(); document.getElementById('more-menu').classList.add('show'); }
function closeMM()  { document.getElementById('more-menu').classList.remove('show'); }

/* ── Expressions ── */
function togE(i, e) {
  e.stopPropagation();
  const was = st[i].eo;
  closeAllE();
  if (!was) {
    st[i].eo = true;
    document.getElementById('ep'+i)?.classList.add('show');
    document.getElementById('et'+i)?.classList.add('open');
  }
}

function closeAllE() {
  st.forEach((s,i) => {
    s.eo = false;
    document.getElementById('ep'+i)?.classList.remove('show');
    document.getElementById('et'+i)?.classList.remove('open');
  });
}

function pickE(i, emoji, e) {
  e.stopPropagation();
  const s = st[i];
  if (s.myE && s.myE !== emoji) s.rc[s.myE] = Math.max(0, s.rc[s.myE] - 1);
  if (s.myE === emoji) { s.rc[emoji] = Math.max(0, s.rc[emoji]-1); s.myE = null; }
  else { s.rc[emoji]++; s.myE = emoji; fl(emoji, e); }
  closeAllE();
  rebuildRR(i);
}

function rebuildRR(i) {
  const s = st[i];
  const row = document.getElementById('rr'+i);
  if (!row) return;
  const top3 = EXPR.filter(e => s.rc[e.e]>0).sort((a,b)=>s.rc[b.e]-s.rc[a.e]).slice(0,3);
  row.innerHTML = top3.map(e =>
    `<div class="react-pill${s.myE===e.e?' sel':''}" onclick="pickE(${i},'${e.e}',event)">${e.e}<span class="rc">${s.rc[e.e]}</span></div>`
  ).join('') + `
    <div class="expr-wrap">
      <button class="expr-toggle" id="et${i}" onclick="togE(${i},event)">😊 స్పందన ▾</button>
      <div class="expr-picker" id="ep${i}">
        ${EXPR.map(e=>`<div class="expr-emoji${s.myE===e.e?' chosen':''}" onclick="pickE(${i},'${e.e}',event)">${e.e}</div>`).join('')}
      </div>
    </div>`;
}

function fl(emoji, e) {
  const span = document.createElement('span');
  span.className = 'fl-emoji'; span.textContent = emoji;
  span.style.left = (e?.clientX || window.innerWidth/2) + 'px';
  span.style.top  = (e?.clientY || window.innerHeight/2) + 'px';
  document.body.appendChild(span);
  setTimeout(() => span.remove(), 1100);
}

let tt;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('click', () => closeAllE());

/* ── Init ── */
function init() {
  buildCards();
  // Recalculate on resize (orientation change)
  window.addEventListener('resize', () => {
    setTimeout(() => { buildCards(); }, 100);
  });
}
// Wait for full page render before building
if (document.readyState === 'complete') {
  init();
} else {
  window.addEventListener('load', init);
}
</script>
